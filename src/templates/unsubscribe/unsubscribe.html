<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .message {
      font-size: 15px;
      color: #555555;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .confirm-btn {
      display: inline-block;
      background-color: #dc3545;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .confirm-btn:hover {
      background-color: #c82333;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .confirm-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Unsubscribe</h1>
    <p class="message">{{status_message}}</p>
    {{form_html}}
  </div>
</body>
</html>
